</head>
<body>

  <!-- Menu -->
  <button class="menu-btn" id="menuBtn" aria-label="Open menu" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav class="menu-overlay" id="menuOverlay">
    <p class="menu-nav-label">Navigation</p>

      <li><a href="about.html">About</a></li>
      <li><a href="exhibits.html">Exhibits</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <a class="site-name-link" href="index.html">Eric Gilmore</a>
  <a class="back-link" href="index.html">← Home</a>

  <div class="contact-layout">
    <div class="contact-left">
      <h1>Get in Touch</h1>
      <p>For inquiries about purchasing a specific work, availability, commissions, or exhibition opportunities, reach out directly or fill in the form.</p>
      <a class="contact-email-link" href="mailto:ericgilmore4215@gmail.com">ericgilmore4215@gmail.com</a>
    </div>

    <div class="contact-right">
      <form class="contact-form" name="contact" method="POST" action="#">
        <div class="form-group">
          <label class="form-label" for="contactName">Name</label>
          <input class="form-input" type="text" id="contactName" name="name" required autocomplete="name">
        </div>

        <div class="form-group">
          <label class="form-label" for="contactEmail">Email</label>
          <input class="form-input" type="email" id="contactEmail" name="email" required autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label" for="contactSubject">Subject</label>
          <input class="form-input" type="text" id="contactSubject" name="subject">
        </div>

        <div class="form-group">
          <label class="form-label" for="contactMessage">Message</label>
          <textarea class="form-textarea" id="contactMessage" name="message" rows="5" required></textarea>
        </div>

        <button class="form-submit" type="submit">Send Message</button>
      </form>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
